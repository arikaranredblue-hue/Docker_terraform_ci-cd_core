version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: user_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql

  backend1:
    build: ./backend
    container_name: backend1
    restart: always
    environment:
      DB_HOST: mariadb
      DB_USER: appuser
      DB_PASSWORD: 1234
      DB_NAME: user_db

  backend2:
    build: ./backend
    container_name: backend2
    restart: always
    environment:
      DB_HOST: mariadb
      DB_USER: appuser
      DB_PASSWORD: 1234
      DB_NAME: user_db

  frontend:
    image: myapp:v1
    container_name: frontend
    depends_on:
      - backend1
      - backend2
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/html:/usr/share/nginx/html

volumes:
  db_data:
