version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: user_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: 1234
    

  backend1:
    image: arikaran0007/backend:v1
    container_name: backend1
    restart: always
    environment:
      DB_HOST: mariadb
      DB_USER: appuser
      DB_PASSWORD: 1234
      DB_NAME: user_db

  backend2:
    image: arikaran0007/backend:v1
    container_name: backend2
    restart: always
    environment:
      DB_HOST: mariadb
      DB_USER: appuser
      DB_PASSWORD: 1234
      DB_NAME: user_db

  frontend:
    image: arikaran0007/frontend:latest
    container_name: frontend
    depends_on:
      - backend1
      - backend2
    ports:
      - "8080:80"
    


