name: Full CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    # 🔐 Docker login
    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🐳 Build & Push Backend
    - name: Build backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:v1 ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/backend:v1

    # 🐳 Build & Push Frontend
    - name: Build frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:v1 ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend:v1
        # 🔹 Deploy
    - name: SSH Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~

          # install docker
          if ! command -v docker &> /dev/null
          then
            sudo yum install -y docker
            sudo systemctl start docker
            sudo usermod -aG docker ec2-user
            newgrp docker
          fi

          # install docker compose plugin
          if ! docker compose version &> /dev/null
          then
            sudo yum install -y docker-compose-plugin
            sudo curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          fi

      

          # pull latest images (including mariadb automatically)
          docker compose pull

          # restart containers
          docker compose up -d --remove-orphans

   